steps:
  # ─── Step 1: Install frontend dependencies ───────────────────────────────
  - name: 'node:20-alpine'
    id: install-deps
    entrypoint: npm
    args: ['ci', '--prefer-offline']
    dir: '.'

  # ─── Step 2: Run ESLint — fail on any warning ─────────────────────────────
  - name: 'node:20-alpine'
    id: lint
    entrypoint: npx
    args: ['eslint', 'src/', '--ext', '.js,.jsx', '--max-warnings=0']
    dir: '.'

  # ─── Step 3: Run Vitest with coverage — fail if < 80% ────────────────────
  - name: 'node:20-alpine'
    id: test
    entrypoint: npm
    args: ['run', 'test:coverage']
    dir: '.'
    env:
      - 'CI=true'

  # ─── Step 4: npm security audit — fail on HIGH or CRITICAL ───────────────
  - name: 'node:20-alpine'
    id: audit
    entrypoint: npm
    args: ['audit', '--audit-level=high', '--omit=dev']
    dir: '.'

  # ─── Step 5: Build Docker image ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - 'build'
      - '--tag'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/votesmart/votesmart-ai:$COMMIT_SHA'
      - '--tag'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/votesmart/votesmart-ai:latest'
      - '--cache-from'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/votesmart/votesmart-ai:latest'
      - '.'

  # ─── Step 6: Push to Artifact Registry ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/votesmart/votesmart-ai'

  # ─── Step 7: Deploy to Cloud Run ─────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'votesmart-ai'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/votesmart/votesmart-ai:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--timeout=30s'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/votesmart/votesmart-ai:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/votesmart/votesmart-ai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
